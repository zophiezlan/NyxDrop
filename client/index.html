<!doctype html>
<html lang="en">
  <head>
    <!--
      Synchronous stubs for @vitejs/plugin-react's Fast Refresh hooks. The
      plugin's own preamble (injected via transformIndexHtml above this) is a
      module script whose import resolves async; main.tsx may load and run
      before that resolves, causing App.tsx's preamble check to throw. These
      stubs are overwritten by the real preamble once it lands. No-op in prod.
    -->
    <script>
      window.$RefreshReg$ = window.$RefreshReg$ || function () {};
      window.$RefreshSig$ = window.$RefreshSig$ || function () { return function (t) { return t; }; };
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Prototype — sample data. A community map of naloxone access in Australia (in development). Anonymous, no accounts, peer-led." />
    <title>NaloxoneLocate (Prototype)</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
