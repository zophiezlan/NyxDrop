name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  check-lint-test:
    name: typecheck + lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run check
      - run: npm run lint
      - run: npm test

  e2e:
    name: Playwright e2e + a11y
    runs-on: ubuntu-latest
    needs: check-lint-test
    env:
      # The dev server boots without DATABASE_URL but /api/* routes will
      # 500. The smoke + accessibility suites don't depend on real data —
      # they assert UI structure that renders regardless. If full-data
      # coverage is needed in CI later, wire up a Postgres service here.
      DATABASE_URL: "postgres://stub:stub@localhost:5432/stub"
      VAPID_PUBLIC_KEY: "stub"
      VAPID_PRIVATE_KEY: "stub"
      VAPID_SUBJECT: "mailto:ci@example.org"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
